name: Release Binaries

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    name: Load config
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - id: set
        run: |
          echo "matrix=$(jq -c '{include: .binaries}' config/binaries.json)" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }}
    needs: prepare
    runs-on: ubuntu-latest
    container:
      image: golang:1.25-alpine
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: apk add --no-cache ca-certificates build-base git

      - name: Clone source
        run: git clone --depth 1 --branch ${{ matrix.ref }} https://github.com/${{ matrix.repo }}.git /tmp/src

      - name: Download wasmvm static lib
        if: matrix.buildType == 'cosmwasm'
        working-directory: /tmp/src
        run: |
          WASMVM_VERSION=$(go list -m github.com/CosmWasm/wasmvm/v3 2>/dev/null || go list -m github.com/CosmWasm/wasmvm/v2 2>/dev/null)
          WASMVM_VERSION=${WASMVM_VERSION##* }
          wget -q "https://github.com/CosmWasm/wasmvm/releases/download/${WASMVM_VERSION}/libwasmvm_muslc.x86_64.a" -O /lib/libwasmvm_muslc.x86_64.a

      - name: Build binary
        working-directory: /tmp/src
        env:
          BUILD_TYPE: ${{ matrix.buildType }}
          BUILD_CMD: ${{ matrix.buildCmd }}
        run: |
          mkdir -p build
          if [ "$BUILD_TYPE" = "cosmwasm" ]; then
            LEDGER_ENABLED=false BUILD_TAGS=muslc LINK_STATICALLY=true make build
          elif [ -n "$BUILD_CMD" ]; then
            sh -c "$BUILD_CMD"
          else
            make build
          fi

      - name: Package
        env:
          BINARY_NAME: ${{ matrix.name }}
        run: gzip -c "/tmp/src/build/${BINARY_NAME}" > "/tmp/${BINARY_NAME}-linux-amd64.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: /tmp/${{ matrix.name }}-linux-amd64.gz

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: [prepare, build]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="binaries/latest"

          BODY=$(jq -r '.binaries[] | "- \(.name): \(.repo)@\(.ref)"' config/binaries.json)
          BODY="${BODY}

          Platform: linux/amd64 (static)
          Updated: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

          gh release delete "$TAG" --yes 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          gh release create "$TAG" \
            --title "Prebuilt Binaries (latest)" \
            --notes "$BODY" \
            --prerelease \
            /tmp/artifacts/*-linux-amd64.gz
