name: Release Binaries

on:
  workflow_dispatch:
    inputs:
      cosmos_sdk_ref:
        description: 'cosmos-sdk git ref (branch/tag)'
        default: 'v0.53.6'
      wasmd_ref:
        description: 'wasmd git ref (branch/tag)'
        default: 'v0.61.9'

permissions:
  contents: write

jobs:
  build-wasmd:
    name: Build wasmd (static)
    runs-on: ubuntu-latest
    container:
      image: golang:1.25-alpine
    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: apk add --no-cache ca-certificates build-base git

      - name: Build wasmd
        run: |
          git clone --depth 1 --branch ${{ github.event.inputs.wasmd_ref }} https://github.com/CosmWasm/wasmd.git /tmp/wasmd-src
          cd /tmp/wasmd-src

          # Download libwasmvm static lib (same as official Dockerfile)
          WASMVM_VERSION=$(go list -m github.com/CosmWasm/wasmvm/v3 2>/dev/null || go list -m github.com/CosmWasm/wasmvm/v2 2>/dev/null)
          WASMVM_VERSION=${WASMVM_VERSION##* }
          wget -q "https://github.com/CosmWasm/wasmvm/releases/download/${WASMVM_VERSION}/libwasmvm_muslc.x86_64.a" -O /lib/libwasmvm_muslc.x86_64.a

          LEDGER_ENABLED=false BUILD_TAGS=muslc LINK_STATICALLY=true make build
          gzip -c /tmp/wasmd-src/build/wasmd > /tmp/wasmd-linux-amd64.gz

      - uses: actions/upload-artifact@v4
        with:
          name: wasmd
          path: /tmp/wasmd-linux-amd64.gz

  build-simd:
    name: Build simd
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Build simd
        run: |
          git clone --depth 1 --branch ${{ github.event.inputs.cosmos_sdk_ref }} https://github.com/cosmos/cosmos-sdk.git /tmp/cosmos-sdk
          cd /tmp/cosmos-sdk/simapp && go build -o /tmp/simd ./simd/
          gzip -c /tmp/simd > /tmp/simd-linux-amd64.gz

      - uses: actions/upload-artifact@v4
        with:
          name: simd
          path: /tmp/simd-linux-amd64.gz

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: [build-wasmd, build-simd]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="binaries/latest"
          BODY="simd: cosmos-sdk@${{ github.event.inputs.cosmos_sdk_ref }}
          wasmd: wasmd@${{ github.event.inputs.wasmd_ref }}
          Platform: linux/amd64 (static)
          Updated: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

          gh release delete "$TAG" --yes 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          gh release create "$TAG" \
            --title "Prebuilt Binaries (latest)" \
            --notes "$BODY" \
            --prerelease \
            /tmp/artifacts/simd-linux-amd64.gz \
            /tmp/artifacts/wasmd-linux-amd64.gz
