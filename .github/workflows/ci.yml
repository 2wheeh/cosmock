name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build & Type check
        run: pnpm check

      - name: Unit tests
        run: pnpm vitest run test/Instance.test.ts

      - name: Smoke test (dist/)
        run: pnpm vitest run test/smoke.test.ts

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Download prebuilt binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "binaries/latest" --pattern "*.gz" --dir /tmp
          gunzip -c /tmp/simd-linux-amd64.gz > /usr/local/bin/simd
          gunzip -c /tmp/wasmd-linux-amd64.gz > /usr/local/bin/wasmd
          chmod +x /usr/local/bin/simd /usr/local/bin/wasmd

      - name: Integration tests
        run: pnpm vitest run test/simd.test.ts test/wasmd.test.ts
