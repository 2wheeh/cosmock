name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build & Type check
        run: pnpm check

      - name: Unit tests
        run: pnpm vitest run test/Instance.test.ts

      - name: Smoke test (dist/)
        run: pnpm vitest run test/smoke.test.ts

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - run: pnpm install --frozen-lockfile

      - name: Build simd
        run: |
          git clone --depth 1 https://github.com/cosmos/cosmos-sdk.git /tmp/cosmos-sdk
          cd /tmp/cosmos-sdk/simapp && go build -o /usr/local/bin/simd ./simd/

      - name: Build wasmd
        run: |
          git clone --depth 1 https://github.com/CosmWasm/wasmd.git /tmp/wasmd
          cd /tmp/wasmd && go build -o /usr/local/bin/wasmd ./cmd/wasmd/

      - name: Integration tests
        run: pnpm vitest run test/simd.test.ts test/wasmd.test.ts
