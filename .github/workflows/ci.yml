name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build & Type check
        run: pnpm check

      - name: Unit & Smoke tests
        run: pnpm vitest run --project unit

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Download prebuilt binaries (simd, wasmd, hermes)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "binaries/latest" --pattern "*.gz" --dir /tmp
          gunzip -c /tmp/simd-linux-amd64.gz > /usr/local/bin/simd
          gunzip -c /tmp/wasmd-linux-amd64.gz > /usr/local/bin/wasmd

          HERMES_VERSION="v1.13.3"
          gh release download "$HERMES_VERSION" \
            --repo informalsystems/hermes \
            --pattern "hermes-${HERMES_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            --dir /tmp

          tar -xzf /tmp/hermes-${HERMES_VERSION}-x86_64-unknown-linux-gnu.tar.gz -C /tmp
          mv /tmp/hermes /usr/local/bin/hermes

          chmod +x /usr/local/bin/simd /usr/local/bin/wasmd /usr/local/bin/hermes

      - name: Integration tests
        run: pnpm vitest run --project integration
