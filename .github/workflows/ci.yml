name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build & Type check
        run: pnpm check

      - name: Unit & Smoke tests
        run: pnpm vitest run --project unit

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Download prebuilt binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "binaries/latest" --pattern "*.gz" --dir /tmp

          for name in $(jq -r '.binaries[].name' config/binaries.json); do
            gunzip -c "/tmp/${name}-linux-amd64.gz" > "/usr/local/bin/${name}"
            chmod +x "/usr/local/bin/${name}"
          done

      - name: Download external binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for row in $(jq -c '.external[]' config/binaries.json); do
            name=$(echo "$row" | jq -r '.name')
            repo=$(echo "$row" | jq -r '.repo')
            ref=$(echo "$row" | jq -r '.ref')
            asset=$(echo "$row" | jq -r '.asset' | sed "s/{ref}/$ref/g")
            extract=$(echo "$row" | jq -r '.extract')

            gh release download "$ref" --repo "$repo" --pattern "$asset" --dir /tmp

            if [ "$extract" = "tar" ]; then
              tar -xzf "/tmp/${asset}" -C /tmp
            else
              gunzip -c "/tmp/${asset}" > "/tmp/${name}"
            fi

            mv "/tmp/${name}" "/usr/local/bin/${name}"
            chmod +x "/usr/local/bin/${name}"
          done

      - name: Integration tests
        run: pnpm vitest run --project integration
